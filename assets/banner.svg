  <text x="118" y="231" font-family="&#39;DM Sans&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-weight="500" font-size="17" fill="#5A5A72">The local, zero-cost merge queue for parallel</text>
  <text x="118" y="255" font-family="&#39;DM Sans&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-weight="500" font-size="17" fill="#5A5A72">Claude Code agents.</text>

  
  <rect x="118" y="282" width="446" height="62" rx="10" fill="rgba(255,0,160,0.07)" stroke="rgba(255,0,160,0.22)"></rect>
