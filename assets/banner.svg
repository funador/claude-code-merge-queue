<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" fill="none" role="img" aria-label="Claude Code Local Merge — the local, zero-cost merge queue for parallel Claude Code agents">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1120"></stop>
      <stop offset="1" stop-color="#111C31"></stop>
    </linearGradient>
    <filter id="cardShadow" x="-8%" y="-12%" width="116%" height="132%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0B1120" flood-opacity="0.40"></feDropShadow>
    </filter>
  </defs>

  <rect x="40" y="30" width="1320" height="460" rx="28" fill="url(#cardBg)" stroke="rgba(255,255,255,0.08)" filter="url(#cardShadow)"></rect>

  <rect x="96" y="100" width="46" height="82" rx="15" fill="#05070E" stroke="rgba(255,255,255,0.12)"></rect>
  <circle cx="119" cy="124" r="7.5" fill="#FF4D4D"></circle>
  <circle cx="119" cy="148" r="7.5" fill="#FFC53D"></circle>
  <circle cx="119" cy="172" r="7.5" fill="#16E0AD"></circle>

  <text x="164" y="178" font-family="&#39;DM Sans&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-weight="700" font-size="56" fill="#F5F7FA">Claude Code Local Merge</text>

  <text x="100" y="228" font-family="&#39;DM Sans&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-weight="500" font-size="26" fill="#9AA6BC">The local, zero-cost merge queue</text>
  <text x="100" y="264" font-family="&#39;DM Sans&#39;, system-ui, -apple-system, &#39;Segoe UI&#39;, Roboto, sans-serif" font-weight="500" font-size="26" fill="#9AA6BC">for parallel Claude Code agents.</text>

  <rect x="100" y="304" width="580" height="112" rx="14" fill="rgba(255,0,160,0.13)" stroke="rgba(255,0,160,0.38)"></rect>
  <text x="126" y="345" font-family="&#39;JetBrains Mono&#39;, ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="500" font-size="19" fill="#FF6AD0"><tspan fill="#7C8BA5">$ </tspan>npm install --save-dev claude-code-local-merge</text>
  <text x="126" y="382" font-family="&#39;JetBrains Mono&#39;, ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="500" font-size="19" fill="#FF6AD0"><tspan fill="#7C8BA5">$ </tspan>npx claude-code-local-merge init</text>

  <g stroke-linecap="round">
    <path d="M980 100 C 1040 100, 1060 400, 1090 400" stroke="#FF2EAE" stroke-width="6"></path>
    <path d="M980 160 C 1080 160, 1120 400, 1170 400" stroke="#22D3EE" stroke-width="6"></path>
    <path d="M980 220 C 1120 220, 1200 400, 1250 400" stroke="#B57BFF" stroke-width="6"></path>
    <path d="M980 280 C 1160 280, 1280 400, 1330 400" stroke="#10D9A6" stroke-width="6"></path>
  </g>
  <circle cx="980" cy="100" r="8" fill="#FF2EAE"></circle>
  <circle cx="980" cy="160" r="8" fill="#22D3EE"></circle>
  <circle cx="980" cy="220" r="8" fill="#B57BFF"></circle>
  <circle cx="980" cy="280" r="8" fill="#10D9A6"></circle>
  <circle cx="1090" cy="400" r="8" fill="#FF2EAE"></circle>
  <circle cx="1170" cy="400" r="8" fill="#22D3EE"></circle>
  <circle cx="1250" cy="400" r="8" fill="#B57BFF"></circle>
  <circle cx="1330" cy="400" r="8" fill="#10D9A6"></circle>

  <line x1="980" y1="400" x2="1340" y2="400" stroke="#CBD5E1" stroke-width="3"></line>
  <text x="980" y="432" font-family="&#39;JetBrains Mono&#39;, ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="500" font-size="17" fill="#94A3B8">queue · one push at a time</text>
</svg>
